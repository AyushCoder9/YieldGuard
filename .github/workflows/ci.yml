name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install -e . --no-deps

      - name: Lint
        run: python -m ruff check src/ dashboard/ || true   # non-blocking until tests exist

      - name: Tests
        run: |
          if [ -d tests ] && find tests -name "*.py" | grep -q .; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No tests yet — skipping"
          fi
